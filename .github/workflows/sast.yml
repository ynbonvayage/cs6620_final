name: SAST Security Scan

# Trigger on pull requests to main branch
on:
  pull_request:
    branches: [main]

jobs:
  sast-scan:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Send code to Lambda for scanning
      - name: Run SAST scan
        id: sast
        run: |
          # Collect JS files from the repo (excluding node_modules)
          CODE=$(find . -name "*.js" -not -path "./node_modules/*" | head -5 | xargs cat 2>/dev/null || echo "")
          
          # Call Lambda Function URL with the code
          RESPONSE=$(curl -s -X POST "${{ secrets.AWS_LAMBDA_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\": \"{\\\"code\\\": \\\"$(echo $CODE | sed 's/"/\\"/g' | tr -d '\n')\\\"}\"}") 
          
          echo "Scan Result: $RESPONSE"
          
          # Check if HIGH severity vulnerabilities exist
          HIGH=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('summary',{}).get('high',0))" 2>/dev/null || echo "0")
          
          # Fail the workflow if HIGH vulnerabilities found
          if [ "$HIGH" -gt "0" ]; then
            echo "❌ HIGH severity vulnerabilities found: $HIGH"
            exit 1
          else
            echo "✅ No HIGH severity vulnerabilities found"
          fi