name: SAST Security Scan

# Trigger on pull requests to main branch
on:
  pull_request:
    branches: [main]

jobs:
  sast-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # required for gh pr comment to post results
    steps:
      # Step 1: Check out the code — full history needed for git diff to find the merge base.
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Send code to Lambda for scanning and post results as a PR comment
      - name: Run SAST scan
        id: sast
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Collect only JS files added or modified in this PR (differential scan).
          # --diff-filter=AM: Added + Modified only, ignores deletions.
          git fetch origin ${{ github.base_ref }} --depth=1
          git diff --name-only --diff-filter=AM origin/${{ github.base_ref }}...HEAD \
            | grep '\.js$' | grep -v 'node_modules' | head -10 > /tmp/changed_js.txt

          if [ ! -s /tmp/changed_js.txt ]; then
            echo "No JS files changed in this PR — skipping scan."
            exit 0
          fi

          xargs cat < /tmp/changed_js.txt 2>/dev/null > /tmp/code_raw.txt || true

          # jq --arg reads the file content and handles all escaping (quotes, backslashes,
          # newlines, unicode) — no shell interpolation of code content at any point.
          jq -n \
            --arg code "$(cat /tmp/code_raw.txt)" \
            --arg repo "${{ github.repository }}" \
            '{"code": $code, "filename": "scan.js", "repo": $repo}' > /tmp/payload.json

          # Send payload from file — curl -d @file never mangles the content
          RESPONSE=$(curl -s -X POST "${{ secrets.AWS_LAMBDA_URL }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json)

          echo "Scan Result: $RESPONSE"

          # Fail loudly if the response has no summary key (Lambda error, scanner unreachable, etc.)
          # jq -e exits non-zero when the filter result is false/null, so has("summary") is a clean check.
          if ! echo "$RESPONSE" | jq -e 'has("summary")' > /dev/null 2>&1; then
            echo "Pipeline error — scanner unreachable. Merge blocked."
            echo "## SAST Scan Results" > /tmp/pr_comment.md
            echo "" >> /tmp/pr_comment.md
            echo "**Scanner error** — pipeline failed to complete. Merge blocked." >> /tmp/pr_comment.md
            echo "" >> /tmp/pr_comment.md
            echo "Response: $RESPONSE" >> /tmp/pr_comment.md
            gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/pr_comment.md
            exit 2
          fi

          HIGH=$(echo "$RESPONSE" | jq '.summary.high')
          MEDIUM=$(echo "$RESPONSE" | jq '.summary.medium')
          LOW=$(echo "$RESPONSE" | jq '.summary.low')
          TOTAL=$(echo "$RESPONSE" | jq '.summary.totalVulnerabilities')
          SCAN_ID=$(echo "$RESPONSE" | jq -r '.scanId')

          # Build comment line by line into a file — avoids YAML flow-map conflicts
          # that occur with { } group redirects or inline multi-line --body strings.
          echo "## SAST Scan Results" > /tmp/pr_comment.md
          echo "" >> /tmp/pr_comment.md
          echo "| Severity | Count |" >> /tmp/pr_comment.md
          echo "|----------|-------|" >> /tmp/pr_comment.md
          echo "| HIGH | $HIGH |" >> /tmp/pr_comment.md
          echo "| MEDIUM | $MEDIUM |" >> /tmp/pr_comment.md
          echo "| LOW | $LOW |" >> /tmp/pr_comment.md
          echo "| **Total** | **$TOTAL** |" >> /tmp/pr_comment.md
          echo "" >> /tmp/pr_comment.md
          if [ "$HIGH" -gt "0" ]; then
            echo "**PR blocked** — HIGH severity vulnerabilities must be fixed before merging." >> /tmp/pr_comment.md
          else
            echo "**No HIGH severity vulnerabilities** — PR is clear to merge." >> /tmp/pr_comment.md
          fi
          echo "" >> /tmp/pr_comment.md
          echo "🔍 **[Click here to view the full scan history for this repository in the Dashboard](http://securegate-dev-frontend-1ee45719.s3-website-us-east-1.amazonaws.com/?repo=${{ github.repository }})**" >> /tmp/pr_comment.md
          echo "" >> /tmp/pr_comment.md
          echo "Scan ID: $SCAN_ID" >> /tmp/pr_comment.md

          # Post the comment to the PR — GITHUB_TOKEN is auto-provided, no extra secret needed.
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/pr_comment.md

          # Fail the workflow if HIGH vulnerabilities found
          if [ "$HIGH" -gt "0" ]; then
            echo "HIGH severity vulnerabilities found: $HIGH"
            exit 1
          else
            echo "No HIGH severity vulnerabilities found"
          fi