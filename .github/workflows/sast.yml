name: SAST Security Scan

on:
  pull_request:
    branches: [main]

jobs:
  sast-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SAST scan
        id: sast
        run: |
          # Collect JS files and save to temp file
          find . -name "*.js" -not -path "./node_modules/*" | head -5 | xargs cat 2>/dev/null > /tmp/code.js || true
          
          # Create JSON payload - send code directly (no extra wrapping)
          python3 -c "
          import json
          with open('/tmp/code.js', 'r') as f:
              code = f.read()
          payload = {'code': code}
          print(json.dumps(payload))
          " > /tmp/payload.json
          
          # Call Lambda
          RESPONSE=$(curl -s -X POST "${{ secrets.AWS_LAMBDA_URL }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json)
          
          echo "Scan Result: $RESPONSE"
          
          # Check HIGH severity - fail loudly if response is malformed
          HIGH=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['high'])")
          
          if [ "$HIGH" -gt "0" ]; then
            echo "❌ HIGH severity vulnerabilities found: $HIGH"
            exit 1
          else
            echo "✅ No HIGH severity vulnerabilities found"
          fi
